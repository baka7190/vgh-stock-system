<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VGH Stock | Vanimo General Hospital{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        :root { --vgh-dark: #021204; --vgh-green: #0a9424; --vgh-text: #8ba390; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; }
        .hidden { display: none !important; }
        .glass-modal { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; align-items: center; justify-content: center; }
        #sidebar { width: 280px; background: var(--vgh-dark); min-height: 100vh; position: fixed; padding: 2rem 1.5rem; color: white; z-index: 100; }
        .brand-box { display: flex; align-items: center; gap: 12px; margin-bottom: 2.5rem; }
        .brand-logo { width: 42px; height: 42px; background: var(--vgh-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .nav-link { color: var(--vgh-text); display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 12px; font-weight: 600; text-decoration: none; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--vgh-green); color: white; }
        .main-content { margin-left: 280px; padding: 2.5rem; min-height: 100vh; }
        @media (max-width: 992px) { #sidebar { display: none; } .main-content { margin-left: 0; padding: 1.5rem; } }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand-box">
            <div class="brand-logo"><i data-lucide="plus" color="white"></i></div>
            <div>
                <h6 class="mb-0 fw-bold text-white">VGH Stock</h6>
                <small class="text-secondary" style="font-size: 11px;">Vanimo General Hospital</small>
            </div>
        </div>
        <div class="nav flex-column mb-auto">
            <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="/inventory" class="nav-link {% if request.path == '/inventory' %}active{% endif %}"><i data-lucide="package"></i> Inventory</a>
            <a href="/stock-in" class="nav-link"><i data-lucide="package-plus"></i> Stock In</a>
            <a href="/dispatch" class="nav-link"><i data-lucide="package-minus"></i> Stock Out</a>
            <a href="/scanner" class="nav-link"><i data-lucide="scan"></i> Scanner</a>
            <a href="/alerts" class="nav-link"><i data-lucide="bell"></i> Alerts</a>
            <a href="/reports" class="nav-link"><i data-lucide="bar-chart-3"></i> Reports</a>
        </div>
        <div class="copyright">© 2026 Vanimo General Hospital</div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div id="categoryModal" class="glass-modal">
        <div class="bg-white rounded-[2rem] p-5 max-w-lg w-100 shadow-2xl" style="border-radius: 2rem; max-width: 500px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-dark">Manage Categories</h4>
                <button onclick="toggleModal('categoryModal')" class="btn-close shadow-none"></button>
            </div>
            <div id="categoryList" class="text-center py-4">
                <p class="text-muted mb-4">No categories yet. Add one below.</p>
                <div class="d-flex flex-column gap-2 text-start" id="currentCategories"></div>
            </div>
            <div class="pt-4 border-t text-end">
                <button onclick="openNewCategoryForm()" class="btn btn-success fw-bold px-4 py-2 rounded-3" style="background: var(--vgh-green);">Add Category</button>
            </div>
        </div>
    </div>

    <div id="newCategoryFormModal" class="glass-modal" style="z-index: 2100;">
        <div class="bg-white rounded-[1.5rem] p-5 max-w-lg w-100 shadow-2xl" style="border-radius: 1.5rem; max-width: 550px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-dark">New Category</h4>
                <button onclick="toggleModal('newCategoryFormModal')" class="btn-close shadow-none"></button>
            </div>
            <form id="saveCategoryForm" class="row g-3 text-start">
                <div class="col-12"><label class="form-label fw-bold small">CATEGORY NAME</label><input type="text" id="cat_name" placeholder="e.g. Surgical Gloves" required class="form-control"></div>
                <div class="col-12"><label class="form-label fw-bold small">TYPE</label><select id="cat_type" class="form-select"><option>Medical Supplies</option><option>Pharmaceuticals</option><option>Equipment</option></select></div>
                <div class="col-12 d-flex justify-content-end gap-3 pt-4"><button type="button" onclick="toggleModal('newCategoryFormModal')" class="btn btn-link text-dark fw-bold text-decoration-none">Cancel</button><button type="button" onclick="submitNewCategory()" class="btn btn-success fw-bold px-5 py-2 rounded-3" style="background: #066d1a;">Save</button></div>
            </form>
        </div>
    </div>

    <div id="regModal" class="glass-modal">
        <div class="bg-white rounded-[1.5rem] p-5 max-w-lg w-100 shadow-2xl" style="border-radius: 1.5rem; max-width: 550px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-dark">Add New Item</h4>
                <button onclick="toggleModal('regModal')" class="btn-close shadow-none"></button>
            </div>
            <form action="/register_product" method="POST" class="row g-3 text-start">
                <div class="col-12"><label class="form-label fw-bold small">Item Name <span class="text-danger">*</span></label><input type="text" name="name" placeholder="e.g. Surgical Gloves (Medium)" required class="form-control rounded-3"></div>
                <div class="col-md-6"><label class="form-label fw-bold small">SKU <span class="text-danger">*</span></label><input type="text" name="sku" placeholder="e.g. SG-MED-001" required class="form-control bg-light"></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Barcode</label><div class="input-group"><input type="text" id="reg_barcode" name="barcode" placeholder="Scan or enter" class="form-control bg-light"><button type="button" onclick="startModalScanner()" class="input-group-text text-success"><i data-lucide="scan"></i></button></div></div>
                <div class="col-12"><label class="form-label fw-bold small">Category <span class="text-danger">*</span></label><select name="category" id="reg_category_select" class="form-select bg-light"></select></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Unit</label><select name="unit" class="form-select"><option>Units</option><option>Boxes</option></select></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Min. Stock Level</label><input type="number" name="min_limit" value="10" class="form-control"></div>
                <div class="col-12 d-flex justify-content-end gap-3 pt-4"><button type="button" onclick="toggleModal('regModal')" class="btn btn-link text-dark fw-bold text-decoration-none">Cancel</button><button type="submit" class="btn btn-success fw-bold px-4 py-2 rounded-3" style="background: #066d1a;">Add Item</button></div>
            </form>
        </div>
    </div>

    <div id="modalScanner" class="glass-modal" style="z-index: 3000;">
        <div class="bg-dark rounded-4 p-3" style="max-width: 400px; width: 90%;"><div id="modal-reader"></div><button onclick="stopModalScanner()" class="btn btn-danger w-100 mt-3 fw-bold">Cancel Scan</button></div>
    </div>

    <script>
        lucide.createIcons();

        function toggleModal(id) {
            const modal = document.getElementById(id);
            if (modal.style.display === "flex") {
                modal.style.display = "none";
            } else {
                modal.style.display = "flex";
                if(id === 'categoryModal') loadCategories();
                if(id === 'regModal') loadCategoriesIntoForm();
            }
        }

        function openNewCategoryForm() {
            document.getElementById('categoryModal').style.display = 'none';
            document.getElementById('newCategoryFormModal').style.display = 'flex';
        }

        function submitNewCategory() {
            const name = document.getElementById('cat_name').value;
            const type = document.getElementById('cat_type').value;
            const f = new FormData(); f.append('name', name); f.append('type', type);
            fetch('/api/add_category', { method: 'POST', body: f }).then(r => r.json()).then(data => {
                if(data.status === "success") {
                    document.getElementById('saveCategoryForm').reset();
                    document.getElementById('newCategoryFormModal').style.display = 'none';
                    toggleModal('categoryModal');
                }
            });
        }

        function loadCategories() {
            fetch('/api/categories').then(r => r.json()).then(data => {
                const current = document.getElementById('currentCategories');
                const emptyMsg = document.querySelector('#categoryList p');
                if(data.length > 0) {
                    emptyMsg.style.display = 'none';
                    current.innerHTML = data.map(c => `<div class="p-3 bg-light rounded-3 mb-2 fw-bold text-dark uppercase small">${c.name}</div>`).join('');
                }
            });
        }

        function loadCategoriesIntoForm() {
            fetch('/api/categories').then(r => r.json()).then(data => {
                const select = document.getElementById('reg_category_select');
                select.innerHTML = '<option value="" disabled selected>Select category</option>';
                data.forEach(c => { select.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
            });
        }

        let modalScannerObj = null;
        function startModalScanner() {
            document.getElementById('modalScanner').style.display = 'flex';
            modalScannerObj = new Html5Qrcode("modal-reader");
            modalScannerObj.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                document.getElementById('reg_barcode').value = decodedText;
                stopModalScanner();
            }).catch(err => alert("Camera error"));
        }
        function stopModalScanner() {
            if(modalScannerObj) modalScannerObj.stop().then(() => { document.getElementById('modalScanner').style.display = 'none'; });
        }
    </script>
</body>
</html>
