<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTS | Dispatch Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-slate-900 flex min-h-screen">
    <aside class="hidden lg:flex flex-col w-72 h-screen p-8 text-slate-500">
        <div class="font-black text-white text-2xl mb-12 tracking-tighter">WTS TECH</div>
        <nav class="space-y-6">
            <a href="/dashboard" class="flex items-center gap-4 p-4 rounded-3xl hover:bg-slate-800 transition font-bold text-sm">
                <i class="bi bi-arrow-left-circle text-xl"></i> Core Dashboard
            </a>
            <a href="/dispatch" class="bg-red-600 text-white flex items-center gap-4 p-4 rounded-3xl font-bold shadow-xl shadow-red-900/40 text-sm">
                <i class="bi bi-truck text-xl"></i> Dispatch Active
            </a>
        </nav>
    </aside>

    <main class="flex-1 bg-gray-50 rounded-l-[50px] p-6 lg:p-12 shadow-inner">
        <div class="max-w-xl mx-auto space-y-8">
            <div class="bg-white rounded-[4rem] p-12 shadow-2xl border border-slate-100">
                <h3 class="font-black text-3xl text-slate-800 uppercase tracking-tighter mb-10 leading-tight">Authorize <br>Dispatch</h3>

                <form action="/update_stock" method="POST" class="space-y-8">
                    <input type="hidden" name="type" value="out">

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 ml-2">Find Asset Designation</label>
                        <input type="text" id="itemSearch" placeholder="Type first character..." class="w-full p-6 bg-slate-50 border-2 border-slate-50 rounded-[2.5rem] outline-none focus:border-red-500 font-black text-sm transition">
                        <div id="suggest" class="hidden absolute w-full max-w-md bg-white shadow-2xl rounded-[2.5rem] border mt-2 z-50 overflow-hidden divide-y divide-slate-50"></div>
                        <input type="hidden" name="item_id" id="itemId" required>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 ml-2">Units Out</label>
                            <input type="number" name="qty" required class="w-full p-6 bg-slate-50 rounded-[2.5rem] font-black text-lg outline-none border-2 border-slate-50 shadow-inner">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 ml-2">Target Dept</label>
                            <div class="flex gap-2">
                                <select name="dept" id="deptSelect" class="flex-1 p-6 bg-slate-50 rounded-[2.5rem] font-black text-xs outline-none border-2 border-slate-50">
                                    {% for d in depts %}<option>{{ d.name }}</option>{% endfor %}
                                </select>
                                <button type="button" onclick="toggleDeptAdd()" class="bg-slate-900 text-white w-16 rounded-[2rem] shadow-lg"><i class="bi bi-plus-lg"></i></button>
                            </div>
                        </div>
                    </div>

                    <div id="newDeptInput" class="hidden bg-blue-600/5 p-6 rounded-[2.5rem] border border-blue-100 space-y-4">
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Register New Department</p>
                        <div class="flex gap-2">
                            <input type="text" id="newDeptName" placeholder="Designation Name" class="flex-1 p-4 rounded-2xl border-none outline-none text-xs font-bold">
                            <button type="button" onclick="saveNewDept()" class="bg-blue-600 text-white px-6 rounded-2xl text-xs font-black">ADD</button>
                        </div>
                    </div>

                    <div class="space-y-6 pt-8 border-t border-slate-100">
                        <input type="text" name="authorized_by" placeholder="Authorization Name" required class="w-full p-5 bg-slate-50 border-none rounded-[2rem] text-xs font-black shadow-inner">
                        <select name="condition" class="w-full p-5 bg-slate-50 border-none rounded-[2rem] text-[10px] font-black uppercase tracking-widest">
                            <option>Condition: Factory New</option>
                            <option>Condition: Operational / Used</option>
                            <option>Condition: Defective / Repair Needed</option>
                        </select>
                    </div>

                    <button type="submit" class="w-full bg-red-600 text-white py-7 rounded-[2.5rem] font-black text-xs tracking-[0.2em] uppercase hover:bg-red-700 transition shadow-2xl shadow-red-200">Finalize Dispatch</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => document.body.classList.add('loaded'));
        const search = document.getElementById('itemSearch');
        const suggest = document.getElementById('suggest');
        const idIn = document.getElementById('itemId');
        let prods = [];
        fetch('/api/products').then(r => r.json()).then(d => prods = d);

        search.addEventListener('input', function() {
            const v = this.value.toUpperCase(); suggest.innerHTML = '';
            if(v.length < 1) { suggest.classList.add('hidden'); return; }
            const fil = prods.filter(p => p.name.toUpperCase().includes(v));
            if(fil.length > 0) {
                suggest.classList.remove('hidden');
                fil.forEach(p => {
                    const d = document.createElement('div'); d.className = 'p-5 hover:bg-slate-50 cursor-pointer font-black text-xs border-b border-slate-50';
                    d.innerHTML = `<span>${p.name}</span> <span class="text-slate-300 ml-2">(${p.stock})</span>`;
                    d.onclick = () => { search.value = p.name; idIn.value = p.id; suggest.classList.add('hidden'); };
                    suggest.appendChild(d);
                });
            } else suggest.classList.add('hidden');
        });

        function toggleDeptAdd() { document.getElementById('newDeptInput').classList.toggle('hidden'); }

        function saveNewDept() {
            const n = document.getElementById('newDeptName').value;
            if(!n) return;
            const f = new FormData(); f.append('dept_name', n);
            fetch('/add_department', { method: 'POST', body: f })
            .then(r => r.json())
            .then(data => {
                if(data.status === "success") {
                    const opt = document.createElement('option'); opt.text = n;
                    document.getElementById('deptSelect').add(opt);
                    document.getElementById('deptSelect').value = n;
                    toggleDeptAdd();
                } else { alert("Exists!"); }
            });
        }
    </script>
</body>
</html>
